name: SonarQube Microservices Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonar:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - Airline-Service
          - Booking-Service
          - Flight-Service
          - Notification-Service
          - Passenger-Service
          - Payment-Service
          - Seat-Service
          - skybooker-auth-service
          - SkyBooker-api-gateway
          - skybooker-eureka-server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'
          cache: 'maven'

      - name: Build + Sonar Scan - ${{ matrix.service }}
        working-directory: ./${{ matrix.service }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mvn -B clean verify sonar:sonar \
            -Dsonar.projectKey=Harsh9761_SkyBooker_${{ matrix.service }} \
            -Dsonar.organization=harsh9761 \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
