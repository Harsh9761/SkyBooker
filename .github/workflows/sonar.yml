name: SonarCloud Scan

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Analyze skybooker-auth-service
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn -B clean verify sonar:sonar \
            -Dsonar.projectKey=harsh9761_auth \
            -Dsonar.organization=harsh9761 \
            -Dsonar.host.url=https://sonarcloud.io \
            -DskipTests
        working-directory: skybooker-auth-service

      - name: Analyze Booking-Service
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn -B clean verify sonar:sonar \
            -Dsonar.projectKey=harsh9761_booking \
            -Dsonar.organization=harsh9761 \
            -Dsonar.host.url=https://sonarcloud.io \
            -DskipTests
        working-directory: Booking-Service

      - name: Analyze Flight-Service
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn -B clean verify sonar:sonar \
            -Dsonar.projectKey=harsh9761_flight \
            -Dsonar.organization=harsh9761 \
            -Dsonar.host.url=https://sonarcloud.io \
            -DskipTests
        working-directory: Flight-Service 