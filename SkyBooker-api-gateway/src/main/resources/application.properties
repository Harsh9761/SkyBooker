spring.application.name=skyBooker-api-gateway

server.port=${PORT:8080}

# ================= EUREKA =================
eureka.client.service-url.defaultZone=https://skybooker-gj4r.onrender.com/eureka


# JWT Secret 
jwt.secret=${JWT_SECRET}

# ================= ROUTES =================

# Auth Service
spring.cloud.gateway.routes[0].id=auth
spring.cloud.gateway.routes[0].uri=lb://SKYBOOKER-AUTH-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**,/oauth2/**,/login/**

# Booking Service
spring.cloud.gateway.routes[1].id=booking
spring.cloud.gateway.routes[1].uri=lb://BOOKING-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/bookings/**

# Flight Service
spring.cloud.gateway.routes[2].id=flight
spring.cloud.gateway.routes[2].uri=lb://FLIGHT-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/flights/**

# Seat Service
spring.cloud.gateway.routes[3].id=seat
spring.cloud.gateway.routes[3].uri=lb://SEAT-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/seats/**

# Passenger Service
spring.cloud.gateway.routes[4].id=passenger
spring.cloud.gateway.routes[4].uri=lb://PASSENGER-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/passengers/**

# Payment Service
spring.cloud.gateway.routes[5].id=payment
spring.cloud.gateway.routes[5].uri=lb://PAYMENT-SERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/payments/**

# Notification Service
spring.cloud.gateway.routes[6].id=notification
spring.cloud.gateway.routes[6].uri=lb://NOTIFICATION-SERVICE
spring.cloud.gateway.routes[6].predicates[0]=Path=/notifications/**

# Airline & Airport Service
spring.cloud.gateway.routes[7].id=airline-airport
spring.cloud.gateway.routes[7].uri=lb://AIRLINE-SERVICE
spring.cloud.gateway.routes[7].predicates[0]=Path=/airports/**,/airlines/**

# ================= CORS =================
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].max-age=3600